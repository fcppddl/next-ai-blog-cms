# AIGC START
# 部署（npm + pm2）：已默认关闭自动触发；当前自动部署请用 deploy-docker.yml + docker-publish.yml。
# 本文件仅保留「手动运行」以便紧急回滚旧方式。若完全不用可删除本文件。
# 若你使用 Vercel / Railway 等，可删掉本文件，在对应平台连接 GitHub 即可
#
# Secrets：SSH_HOST、SSH_USERNAME、SSH_PASSWORD 或 SSH_PRIVATE_KEY、DEPLOY_PATH。
# 构建在 scripts/deploy-remote.sh。若 git pull 报 GnuTLS/TLS，多为访问 GitHub 不稳，已加重试与 HTTP/1.1；
# 仍失败请在服务器将 origin 改为 git@github.com:... 并配 Deploy Key。
name: Deploy

on:
  # 已禁用 CI 通过后自动部署（避免与 Deploy Docker 重复）。仅 Actions 里手动「Run workflow」会执行。
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git config http.postBuffer 524288000
            git config http.version HTTP/1.1
            ok=0
            for attempt in 1 2 3 4 5; do
              if git fetch origin && git checkout main && git pull origin main; then
                ok=1
                break
              fi
              echo "git fetch/pull 失败，20s 后重试 ($attempt/5)..."
              sleep 20
            done
            if [ "$ok" != "1" ]; then
              echo "多次拉取仍失败。请在服务器执行: git remote -v；可改为 SSH 地址并配置 Deploy Key。"
              exit 1
            fi
            bash scripts/deploy-remote.sh
# AIGC END
