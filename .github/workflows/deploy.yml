# AIGC START
# 部署：CI 在 main 上成功后通过 SSH 在自建机上拉代码并构建重启
# 若你使用 Vercel / Railway 等，可删掉本文件，在对应平台连接 GitHub 即可
#
# Secrets：SSH_HOST、SSH_USERNAME、SSH_PASSWORD 或 SSH_PRIVATE_KEY、DEPLOY_PATH。
# 安装与构建命令写在仓库 scripts/deploy-remote.sh，避免在 YAML 里写复杂 shell 导致远程解析错误。
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 仅：main 上 CI 成功后的自动部署，或手动运行
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git checkout main
            git pull origin main
            bash scripts/deploy-remote.sh
# AIGC END
