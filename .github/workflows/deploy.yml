# AIGC START
# 部署：CI 在 main 上成功后通过 SSH 在自建机上拉代码并构建重启
# 若你使用 Vercel / Railway 等，可删掉本文件，在对应平台连接 GitHub 即可
#
# Secrets：SSH_HOST、SSH_USERNAME、SSH_PASSWORD 或 SSH_PRIVATE_KEY、DEPLOY_PATH。
# 非交互式 SSH 默认没有 nvm 的 PATH，脚本用 bash -lc 模拟登录 shell，才能找到 npm / pm2。
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 仅：main 上 CI 成功后的自动部署，或手动运行
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          script: |
            bash -lc "
            set -e
            cd \"${{ secrets.DEPLOY_PATH }}\"
            export NVM_DIR="$$HOME/.nvm"
            [ -s "$$NVM_DIR/nvm.sh" ] && . "$$NVM_DIR/nvm.sh"
            command -v npm >/dev/null || { [ -f "$$HOME/.bashrc" ] && . "$$HOME/.bashrc"; }
            git fetch origin
            git checkout main
            git pull origin main
            npm ci
            npm run db:push
            npm run build
            pm2 reload ecosystem.config.js --update-env
            "
# AIGC END
